services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: seguimiento_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  web:
    build: .
    env_file: .env
    depends_on:
      - db
    ports:
      - "8000:8000"
    restart: always

volumes:
  postgres_data: