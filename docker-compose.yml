services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: seguimiento_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  web:
    build: .
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=backend.config.settings.production
    depends_on:
      - db
    volumes:
      - staticfiles_prod:/app/backend/staticfiles
      - mediafiles_prod:/app/media
    expose:
      - "8000"
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - staticfiles_prod:/app/backend/staticfiles:ro
      - mediafiles_prod:/app/media:ro
    depends_on:
      - web
    restart: always

volumes:
  postgres_data:
  staticfiles_prod:
  mediafiles_prod:
