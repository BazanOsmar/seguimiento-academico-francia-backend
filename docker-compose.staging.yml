services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: seguimiento_staging_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  mongo-staging:
    image: mongo:7.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongo_staging_data:/data/db
    restart: always

  web:
    build: .
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=backend.config.settings.production
    depends_on:
      - db
      - mongo-staging
    volumes:
      - staticfiles_prod:/app/backend/staticfiles
      - mediafiles_prod:/app/media
    expose:
      - "8000"
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "8002:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - staticfiles_prod:/app/backend/staticfiles:ro
      - mediafiles_prod:/app/media:ro
    depends_on:
      - web
    restart: always

volumes:
  postgres_data:
  mongo_staging_data:
  staticfiles_prod:
  mediafiles_prod:
