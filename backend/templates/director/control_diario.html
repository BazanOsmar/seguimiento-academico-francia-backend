{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Diario — Francia "A"</title>
    <link rel="icon" type="image/png" href="{% static 'img/logo_francia.png' %}">
    
    <!-- Librerías Externas -->
    <link rel="stylesheet" href="{% static 'css/director.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">
    <link rel="stylesheet" href="{% static 'css/flatpickr-dark.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/es.js"></script>
    <script src="{% static 'js/api.js' %}"></script>
    
    <script>
        const token = localStorage.getItem('access_token');
        const user  = JSON.parse(localStorage.getItem('user') || 'null');
        if (!token || !user || !['Director', 'Regente'].includes(user.tipo_usuario)) {
            window.location.replace('/login/');
        }
    </script>

    <style>
        /* ── Layout y Scroll ── */
        html, body { height: 100%; overflow: hidden; background: var(--bg-app); }
        .main-content { height: calc(100vh - 70px); overflow-y: auto; padding-bottom: 60px; scroll-behavior: smooth; }
        .content-wrap { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

        /* ── Hero de fecha (Glassmorphism) ── */
        .fecha-hero {
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(26, 45, 69, 0.8) 100%) !important;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-radius: 24px;
            padding: 20px 28px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .fecha-hero__texto { font-size: 1.6rem; font-weight: 800; color: var(--text-primary); letter-spacing: -0.02em; }
        .fecha-hero__dia-semana { font-size: 0.9rem; font-weight: 600; color: var(--accent-text); text-transform: uppercase; margin-bottom: 2px; }
        .fecha-hero__input {
            width: 150px !important;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            padding: 10px 16px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            text-align: center !important;
            transition: all 0.2s;
            outline: none;
        }
        .fecha-hero__input:hover { border-color: var(--accent); background: rgba(255, 255, 255, 0.08); }

        /* ── Pestañas Fijas (Sticky Tabs) ── */
        .control-tabs {
            display: flex;
            gap: 10px;
            background: transparent;
            padding: 8px 0;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            z-index: 100;   
        }
        .tab-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid var(--border-subtle);
            background: var(--bg-card);
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tab-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .tab-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 6px 15px rgba(59, 130, 246, 0.3);
        }
        .tab-badge { background: rgba(0,0,0,0.25); padding: 2px 8px; border-radius: 8px; font-size: 0.7rem; }

        /* ── Chips Resumen ── */
        .resumen-strip { display: flex; gap: 12px; margin-bottom: 24px; }
        .resumen-chip {
            display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 12px;
            font-size: 0.85rem; font-weight: 600; border: 1px solid transparent;
        }
        .resumen-chip b { font-size: 1.1rem; font-weight: 800; }
        .resumen-chip--ok { background: rgba(34, 197, 94, 0.1); color: var(--success); border-color: rgba(34, 197, 94, 0.15); }
        .resumen-chip--no { background: rgba(251, 146, 60, 0.1); color: #fb923c; border-color: rgba(251, 146, 60, 0.15); }

        /* ── Tarjetas de Cursos (Compactas) ── */
        .cursos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; }
        .curso-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            border-top: 5px solid var(--border-subtle);
            position: relative;
        }
        .curso-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: var(--shadow-lg); }
        .curso-card--ok { border-top-color: var(--success); }
        .curso-card--no { border-top-color: #fb923c; }
        .curso-card__nombre { font-size: 1.35rem; font-weight: 800; color: var(--text-primary); margin-bottom: 4px; letter-spacing: -0.02em; }
        .curso-card__alumnos { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 9px; font-weight: 500; }
        .curso-card__divider { height: 1px; background: linear-gradient(90deg, var(--border-subtle) 0%, transparent 100%); margin-bottom: 9px; }
        .status-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; padding: 3px 9px; border-radius: 8px; margin-bottom: 6px; }
        .status-badge--ok { background: rgba(34,197,94,0.1); color: var(--success); }
        .status-badge--no { background: rgba(251,146,60,0.1); color: #fb923c; }
        .curso-card__by { font-size: 0.7rem; color: var(--text-muted); line-height: 1.4; }

        /* ── Contenido de Pestañas ── */
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ── Listas: Correcciones y Citaciones ── */
        .actividad-item, .cit-card {
            background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 18px;
            padding: 16px 20px; margin-bottom: 10px; transition: all 0.2s;
        }
        .actividad-item { border-left: 4px solid var(--danger); display: flex; gap: 16px; align-items: flex-start; }
        .actividad-icono { width: 36px; height: 36px; border-radius: 10px; background: rgba(239, 68, 68, 0.1); display: flex; align-items: center; justify-content: center; color: var(--danger); flex-shrink: 0; }
        .actividad-desc { font-size: 0.95rem; color: var(--text-primary); font-weight: 600; }
        .actividad-meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }

        .cit-card:hover { border-color: var(--accent); transform: translateX(5px); }
        .cit-card__top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
        .cit-card__estudiante { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); }
        .cit-card__curso { font-size: 0.75rem; color: var(--accent-text); font-weight: 600; background: var(--accent-dim); padding: 2px 8px; border-radius: 6px; }
        .cit-badge { font-size: 0.7rem; font-weight: 700; padding: 3px 9px; border-radius: 10px; text-transform: uppercase; background: rgba(148,163,184,0.1); color: #94a3b8; }

        /* ── Estados de Carga ── */
        .grid-loading { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 60px; color: var(--text-muted); font-weight: 500; }
        .grid-spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Drawer de Estudiantes ── */
        .panel-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.7); display: none; justify-content: flex-end; backdrop-filter: blur(4px); }
        .panel-overlay.open { display: flex; }
        .panel-drawer { width: min(450px, 100vw); height: 100%; background: var(--bg-card); border-left: 1px solid var(--border); display: flex; flex-direction: column; border-radius: 32px 0 0 32px; box-shadow: -20px 0 60px rgba(0,0,0,0.5); animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .panel-header { padding: 32px; border-bottom: 1px solid var(--border-subtle); position: relative; }
        .panel-close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.05); border: none; color: var(--text-muted); cursor: pointer; padding: 8px; border-radius: 12px; transition: all 0.2s; }
        .panel-close:hover { background: var(--danger-dim); color: var(--danger); }
        .panel-title { font-size: 1.8rem; font-weight: 800; color: var(--text-primary); letter-spacing: -0.03em; }
        .panel-body { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 10px; }
        .est-row { display: flex; align-items: center; gap: 14px; padding: 14px 18px; background: var(--bg-app); border-radius: 16px; border: 1px solid var(--border-subtle); }
        .est-num { width: 32px; height: 32px; border-radius: 10px; background: var(--bg-card); display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 700; color: var(--text-muted); }
        .est-nombre { flex: 1; font-size: 0.95rem; font-weight: 600; color: var(--text-primary); }
        .est-estado-dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-P { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .dot-F { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
        .dot-A { background: #fb923c; box-shadow: 0 0 8px #fb923c; }
        .dot-L { background: #60a5fa; box-shadow: 0 0 8px #60a5fa; }
    </style>
</head>

    <script>
        const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
        const DIAS  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
        
        function hoyBolivia() { return new Date().toLocaleDateString('sv-SE', { timeZone: 'America/La_Paz' }); }
        function fechaHeroTexto(f) { const [y, m, d] = f.split('-').map(Number); return `${d} de ${MESES[m - 1]} - ${y}`; }
        function diaSemana(f) { const [y, m, d] = f.split('-').map(Number); return DIAS[new Date(y, m - 1, d).getDay()]; }

        const _u = JSON.parse(localStorage.getItem('user') || '{}');
        document.getElementById('profileName').textContent = `${_u.first_name || ''} ${_u.last_name || ''}`.trim() || _u.username;
        document.getElementById('profileRole').textContent = _u.tipo_usuario || 'Administración';
        
        const sidebar = document.querySelector('.sidebar');
        document.getElementById('btnMenu').onclick = () => sidebar.classList.toggle('sidebar--open');
        document.getElementById('btnLogout').onclick = () => { localStorage.clear(); window.location.replace('/login/'); };

        // Tabs
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');
        tabBtns.forEach(btn => {
            btn.onclick = () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                tabContents.forEach(c => c.classList.remove('active'));
                document.getElementById(btn.dataset.tab).classList.add('active');
            };
        });

        const inputFecha = document.getElementById('inputFecha');
        let _cursosCache = [];

        async function cargarTodo() {
            const f = inputFecha.value;
            if (!f) return;
            await Promise.all([cargarAsistencia(f), cargarActividadRegente(f), cargarCitaciones(f)]);
        }

        async function cargarAsistencia(f) {
            const grid = document.getElementById('cursosGrid');
            grid.innerHTML = '<div class="grid-loading"><div class="grid-spinner"></div> Cargando cursos...</div>';
            
            const [cRes, eRes] = await Promise.all([fetchAPI('/api/academics/cursos/'), fetchAPI(`/api/attendance/estado-diario/?fecha=${f}`)]);
            if (!cRes.ok || !eRes.ok) { grid.innerHTML = '<div class="grid-loading">Error al cargar datos.</div>'; return; }
            
            _cursosCache = cRes.data;
            const sesiones = eRes.data.sesiones || [];
            const sesMap = {}; sesiones.forEach(s => sesMap[s.curso_id] = s);
            
            let ok = 0, no = 0;
            grid.innerHTML = _cursosCache.map(c => {
                const s = sesMap[c.id];
                if (s) ok++; else no++;
                return `
                <div class="curso-card curso-card--${s?'ok':'no'}" onclick="abrirPanel(${c.id}, '${f}', ${!s})">
                    <div class="curso-card__nombre">${c.grado}° "${c.paralelo}"</div>
                    <div class="curso-card__alumnos">${c.estudiantes_count} est.</div>
                    <div class="curso-card__divider"></div>
                    <span class="status-badge status-badge--${s?'ok':'no'}">${s?'Registrada':'No controlada'}</span>
                    ${s?`<div class="curso-card__by">Por: ${s.registrado_por.nombre}</div>`:''}
                </div>`;
            }).join('');
            
            document.getElementById('countOk').textContent = ok;
            document.getElementById('countNo').textContent = no;
            document.getElementById('resumenStrip').style.display = 'flex';
        }

        async function cargarActividadRegente(f) {
            const grid = document.getElementById('gridActividadRegente');
            const badge = document.getElementById('badgeCorrecciones');
            const { ok, data } = await fetchAPI(`/api/auditoria/actividad/?accion=RESTABLECER_ATRASO&fecha=${f}`);
            const items = ok ? data.results : [];
            const total = ok ? Number(data.total ?? items.length) : 0;
            badge.textContent = total;
            grid.innerHTML = items.length ? items.map(i => `
                <div class="actividad-item">
                    <div class="actividad-icono"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
                    <div>
                        <div class="actividad-desc">${i.descripcion}</div>
                        <div class="actividad-meta">${i.usuario_nombre} &middot; ${new Date(i.fecha).toLocaleTimeString()}</div>
                    </div>
                </div>`).join('') : '<div class="grid-loading">Sin correcciones registradas para hoy.</div>';
        }

        async function cargarCitaciones(f) {
            const grid = document.getElementById('gridCitCreadas');
            const badge = document.getElementById('badgeCitTab');
            const res = await fetchAPI(`/api/discipline/citaciones/?fecha_creacion=${f}&asistencia=PENDIENTE`);
            const lista = res.ok ? res.data : [];
            badge.textContent = lista.length;
            grid.innerHTML = lista.length ? lista.map(c => `
                <div class="cit-card">
                    <div class="cit-card__summary">
                        <div class="cit-card__info">
                            <div class="cit-card__top">
                                <div class="cit-card__estudiante">${c.estudiante_nombre}</div>
                                <span class="cit-badge">Pendiente</span>
                            </div>
                            <div class="cit-card__curso">${c.curso}</div>
                            <div class="cit-card__motivo">${c.motivo}</div>
                        </div>
                    </div>
                </div>`).join('') : '<div class="grid-loading">Sin citaciones pendientes.</div>';
        }

        async function abrirPanel(cursoId, fecha, sinSesion) {
            if (sinSesion) return;
            const res = await fetchAPI(`/api/attendance/cursos/${cursoId}/asistencia/?fecha=${fecha}`);
            if (!res.ok) return;
            const curso = _cursosCache.find(x => x.id == cursoId);
            document.getElementById('panelTitulo').textContent = `${curso.grado}° "${curso.paralelo}"`;
            document.getElementById('panelSubtitulo').textContent = fechaHeroTexto(fecha);
            const cfg = { PRESENTE: 'dot-P', FALTA: 'dot-F', ATRASO: 'dot-A', LICENCIA: 'dot-L' };
            document.getElementById('panelBody').innerHTML = res.data.asistencias.map((a, i) => `
                <div class="est-row">
                    <span class="est-num">${i+1}</span>
                    <div class="est-estado-dot ${cfg[a.estado] || 'dot-P'}"></div>
                    <span class="est-nombre">${a.nombre_completo}</span>
                </div>`).join('');
            document.getElementById('panelOverlay').classList.add('open');
        }

        document.getElementById('panelClose').onclick = () => document.getElementById('panelOverlay').classList.remove('open');

        document.addEventListener('DOMContentLoaded', () => {
            const hoy = hoyBolivia();
            document.getElementById('heroFecha').textContent = fechaHeroTexto(hoy);
            document.getElementById('heroDiaSemana').textContent = diaSemana(hoy);

            function reposicionarDatepicker(instance) {
                if (!instance || !instance.isOpen) return;
                requestAnimationFrame(() => instance._positionCalendar());
            }

            const fp = flatpickr('#inputFecha', {
                locale: 'es', dateFormat: 'Y-m-d', defaultDate: hoy, maxDate: hoy,
                position: 'auto right',
                onReady: (_, __, instance) => reposicionarDatepicker(instance),
                onOpen: (_, __, instance) => reposicionarDatepicker(instance),
                onChange: (ds, dateStr) => {
                    document.getElementById('heroFecha').textContent = fechaHeroTexto(dateStr);
                    document.getElementById('heroDiaSemana').textContent = diaSemana(dateStr);
                    cargarTodo();
                }
            });

            window.addEventListener('resize', () => reposicionarDatepicker(fp));
            document.querySelector('.main-content')?.addEventListener('scroll', () => reposicionarDatepicker(fp));
            cargarTodo();
        });
    </script>
</body>
</html>
