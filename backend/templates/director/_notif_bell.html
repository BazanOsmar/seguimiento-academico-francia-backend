<!-- ── Campana de notificaciones ───────────────────────────────── -->

<div class="notif-backdrop" id="notifBackdrop" style="display:none;"></div>
<div class="notif-panel" id="notifPanel" style="display:none;">

            </svg>
        </button>
    </div>

    <div class="notif-panel__filters">
        <div class="notif-tabs" id="notifTabs">
            <button class="notif-tab notif-tab--active" data-filtro="todas">Todas</button>
            <button class="notif-tab" data-filtro="no_leidas">No leídas</button>
            <button class="notif-tab" data-filtro="leidas">Leídas</button>

            </button>
            <button class="notif-fecha-clear" id="notifFechaClear" title="Quitar filtro" style="display:none;">×</button>
            <!-- input oculto que flatpickr controla -->
            <input type="text" id="notifFechaFiltroInput" class="notif-fp-input" readonly>
        </div>
    </div>

    <div class="notif-panel__list" id="notifList">
        <div class="notif-loading">Cargando…</div>
    </div>

    <div class="notif-panel__footer" id="notifFooter" style="display:none;">
        <button class="notif-page-btn" id="notifPrev" disabled>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
