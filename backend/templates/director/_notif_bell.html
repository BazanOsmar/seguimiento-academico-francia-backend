{% load static %}
<!-- ── Campana de notificaciones ───────────────────────────────── -->
<button class="btn-icon notif-bell director--notif-bell-inline-style-1" id="btnNotifBell" aria-label="Notificaciones">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
    <span class="notif-badge director--notif-bell-inline-style-2" id="notifBadge"></span>
</button>

<!-- ── Modal notificaciones ──────────────────────────────────────── -->
<div class="notif-backdrop director--notif-bell-inline-style-2" id="notifBackdrop"></div>
<div class="notif-panel director--notif-bell-inline-style-2" id="notifPanel" role="dialog" aria-modal="true" aria-labelledby="notifPanelTitle">
    <div class="notif-panel__head">
        <div class="notif-panel__heading">
            <span class="notif-panel__eyebrow">Centro de avisos</span>
            <span class="notif-panel__title" id="notifPanelTitle">Notificaciones</span>
            <span class="notif-panel__meta" id="notifPanelMeta">Cargando estado...</span>
        </div>
        <button class="notif-close-btn" id="btnCerrarNotif" aria-label="Cerrar notificaciones">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
    </div>

    <div class="notif-panel__filters">
        <div class="notif-tabs" id="notifTabs" role="tablist" aria-label="Filtro de notificaciones">
            <button class="notif-tab notif-tab--active" data-filtro="todas" role="tab" aria-selected="true">Todas</button>
            <button class="notif-tab" data-filtro="no_leidas">No leídas</button>
            <button class="notif-tab" data-filtro="leidas">Leídas</button>
        </div>
        <div class="notif-fecha-wrap">
            <button class="notif-cal-btn" id="notifFechaBtn" type="button" title="Filtrar por fecha" aria-label="Filtrar notificaciones por fecha">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                    <line x1="16" y1="2" x2="16" y2="6"/>
                    <line x1="8" y1="2" x2="8" y2="6"/>
                    <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                <span class="notif-fecha-label" id="notifFechaLabel"></span>
            </button>
            <button class="notif-fecha-clear director--notif-bell-inline-style-2" id="notifFechaClear" title="Quitar filtro">×</button>
            <!-- input oculto que flatpickr controla -->
            <input type="text" id="notifFechaFiltroInput" class="notif-fp-input" readonly>
        </div>
    </div>

    <div class="notif-panel__list" id="notifList">
        <div class="notif-loading">Cargando…</div>
    </div>

    <div class="notif-panel__footer director--notif-bell-inline-style-2" id="notifFooter">
        <button class="notif-page-btn" id="notifPrev" disabled>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
        </button>
        <span class="notif-page-info" id="notifPageInfo"></span>
        <button class="notif-page-btn" id="notifNext">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"/>
            </svg>
        </button>
    </div>
</div>

<link rel="stylesheet" href="{% static 'css/director__notif_bell.css' %}">
