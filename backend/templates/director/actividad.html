{% load static static_v %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Actividad — Francia "A"</title>
    <link rel="icon" type="image/png" href="{% static 'img/logo_francia.png' %}">
    <link rel="stylesheet" href="{% static 'css/director.css' %}">
    <script src="{% static 'js/api.js' %}"></script>
    <script>
        const token = localStorage.getItem('access_token');
        const user  = JSON.parse(localStorage.getItem('user') || 'null');
        if (!token || !user || !['Director'].includes(user.tipo_usuario)) {
            window.location.replace('/login/');
        }
    </script>
    <style>
        /* ── Chips de filtro ── */
        .chips-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 18px;
        }

        .chip-filtro {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: background .15s, color .15s, border-color .15s;
        }
        .chip-filtro:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .chip-filtro.chip--active {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent-text);
        }

        /* ── Badges de acción ── */
        .accion-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .badge-login      { background: rgba(59,130,246,.12);  color: #60a5fa; }
        .badge-usuario    { background: rgba(74,222,128,.12);  color: #4ade80; }
        .badge-reset      { background: rgba(251,146,60,.12);  color: #fb923c; }
        .badge-asistencia { background: rgba(6,182,212,.12);   color: #22d3ee; }
        .badge-citacion   { background: rgba(192,132,252,.12); color: #c084fc; }
        .badge-default    { background: rgba(148,163,184,.12); color: #94a3b8; }

        /* ── Paginación ── */
        .pagination-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-top: 1px solid var(--border-subtle);
        }
        .page-info { font-size: 0.8rem; color: var(--text-muted); }

        .btn-page {
            padding: 6px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: background .15s, color .15s;
        }
        .btn-page:hover:not(:disabled) { background: var(--bg-card-hover); color: var(--text-primary); }
        .btn-page:disabled { opacity: .35; cursor: not-allowed; }

        .td-descripcion { max-width: 420px; }
    </style>
</head>
<body>

    <!-- ── Sidebar ──────────────────────────────────────────────── -->
    <aside class="sidebar">
        <div class="sidebar-profile">
            <div class="sidebar-avatar">
                <img src="{% static 'img/logo_francia.png' %}" alt="Logo Francia A">
            </div>
            <div class="sidebar-profile-info">
                <span class="profile-name" id="profileName">Portal Director</span>
                <span class="profile-role" id="profileRole">Administración</span>
            </div>
        </div>

        <nav class="sidebar-nav" aria-label="Menú principal">
            <a href="/director/estudiantes/" class="nav-item" aria-label="Estudiantes">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                    <path d="M6 12v5c3 3 9 3 12 0v-5"/>
                </svg>
                <span class="nav-label">Estudiantes</span>
            </a>
            <a href="/director/usuarios/" class="nav-item" aria-label="Usuarios">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                <span class="nav-label">Usuarios</span>
            </a>
            <a href="/director/asistencia/" class="nav-item" aria-label="Asistencia">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2"/>
                    <line x1="16" y1="2" x2="16" y2="6"/>
                    <line x1="8"  y1="2" x2="8"  y2="6"/>
                    <line x1="3"  y1="10" x2="21" y2="10"/>
                    <path d="M9 16l2 2 4-4"/>
                </svg>
                <span class="nav-label">Asistencia</span>
            </a>
            <a href="/director/control-diario/" class="nav-item" aria-label="Control Diario">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
                    <rect x="9" y="3" width="6" height="4" rx="1"/>
                    <path d="M9 12l2 2 4-4"/>
                </svg>
                <span class="nav-label">Control Diario</span>
            </a>
            <a href="/director/comunicados/" class="nav-item" aria-label="Comunicados">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 11l19-9v18L3 13v-2z"/>
                    <path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/>
                </svg>
                <span class="nav-label">Comunicados</span>
            </a>
            <a href="/director/actividad/" class="nav-item active" aria-label="Actividad">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                </svg>
                <span class="nav-label">Actividad</span>
            </a>
            <a href="/director/academico/" class="nav-item" aria-label="Académico">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                </svg>
                <span class="nav-label">Académico</span>
            </a>
            <a href="/director/estadisticas/" class="nav-item" aria-label="Estadísticas">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="20" x2="18" y2="10"/>
                    <line x1="12" y1="20" x2="12" y2="4"/>
                    <line x1="6"  y1="20" x2="6"  y2="14"/>
                </svg>
                <span class="nav-label">Estadísticas</span>
            </a>
        </nav>

        <div class="sidebar-bottom">
            <a href="/director/mi-perfil/" class="nav-item" aria-label="Mi Perfil">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span class="nav-label">Mi Perfil</span>
            </a>
            <button class="nav-item" id="btnLogout" aria-label="Cerrar sesión">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                <span class="nav-label">Cerrar</span>
            </button>
        </div>
    </aside>

    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- ── Top bar ────────────────────────────────────────────────── -->
    <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
            <button class="btn-menu" id="btnMenu" aria-label="Abrir menú">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6"  x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <h1 class="page-title">Actividad del sistema</h1>
        </div>
    </header>

    <!-- ── Contenido ─────────────────────────────────────────────── -->
    <main class="main-content">
        <div class="content-wrap">

            <!-- Chips de filtro -->
            <div class="chips-row">
                <button class="chip-filtro chip--active" data-accion="">Todos</button>
                <button class="chip-filtro" data-accion="LOGIN">Logins</button>
                <button class="chip-filtro" data-accion="CREAR_USUARIO">Crear usuario</button>
                <button class="chip-filtro" data-accion="RESET_PASSWORD">Reset contraseña</button>
                <button class="chip-filtro" data-accion="REGISTRAR_ASISTENCIA">Asistencia</button>
                <button class="chip-filtro" data-accion="CREAR_CITACION">Crear citación</button>
                <button class="chip-filtro" data-accion="ACTUALIZAR_CITACION">Act. citación</button>
            </div>

            <!-- Tabla -->
            <div class="table-card">
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th style="width:140px;">Acción</th>
                                <th>Descripción</th>
                                <th>Usuario</th>
                                <th style="width:150px;">Fecha</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyActividad">
                            <tr class="tr-loading">
                                <td colspan="4">
                                    <div class="table-spinner"></div>
                                    Cargando…
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="pagination-row">
                    <span id="tableCount" class="table-count">— registros</span>
                    <div style="display:flex;align-items:center;gap:10px;">
                        <button class="btn-page" id="btnPrev">← Anterior</button>
                        <span class="page-info" id="pageInfo">—</span>
                        <button class="btn-page" id="btnNext">Siguiente →</button>
                    </div>
                </div>
            </div>

        </div>
    </main>

<script src="{% static_v 'js/actividad.js' %}"></script>
<script>
    /* ── Sidebar ──────────────────────────────────────────────── */
    const _user = JSON.parse(localStorage.getItem('user') || 'null');
    if (_user) {
        const nombre = `${_user.first_name || ''} ${_user.last_name || ''}`.trim() || _user.username;
        document.getElementById('profileName').textContent = nombre;
        document.getElementById('profileRole').textContent = _user.tipo_usuario || 'Administración';
    }

    const sidebar  = document.querySelector('.sidebar');
    const backdrop = document.getElementById('sidebarBackdrop');
    const btnMenu  = document.getElementById('btnMenu');
    const isDesktop = () => window.matchMedia('(min-width: 769px)').matches;
    let _leaveTimer;
    sidebar.addEventListener('mouseenter', () => {
        clearTimeout(_leaveTimer);
        if (isDesktop()) sidebar.classList.add('sidebar--expanded');
    });
    sidebar.addEventListener('mouseleave', () => {
        if (isDesktop()) _leaveTimer = setTimeout(() => sidebar.classList.remove('sidebar--expanded'), 200);
    });
    document.addEventListener('mousemove', function _checkSidebar(e) {
        document.removeEventListener('mousemove', _checkSidebar);
        if (!isDesktop()) return;
        const r = sidebar.getBoundingClientRect();
        if (e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom) {
            sidebar.classList.add('sidebar--expanded');
        }
    });
    btnMenu.addEventListener('click', () =>
        sidebar.classList.contains('sidebar--open')
            ? (sidebar.classList.remove('sidebar--open'), backdrop.classList.remove('visible'))
            : (sidebar.classList.add('sidebar--open'),    backdrop.classList.add('visible'))
    );
    backdrop.addEventListener('click', () => {
        sidebar.classList.remove('sidebar--open');
        backdrop.classList.remove('visible');
    });

    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', e => {
            const href = item.getAttribute('href');
            if (!href || href === '#') e.preventDefault();
        });
    });

    document.getElementById('btnLogout').addEventListener('click', () => {
        localStorage.removeItem('access_token');
        localStorage.removeItem('refresh_token');
        localStorage.removeItem('user');
        window.location.replace('/login/');
    });
</script>

</body>
</html>
