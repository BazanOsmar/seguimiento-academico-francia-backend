{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Dashboard — Francia "A"</title>
    <link rel="icon" type="image/png" href="{% static 'img/logo_francia.png' %}">
    <link rel="stylesheet" href="{% static 'css/director.css' %}">

    <script>
        /* ── Protección de ruta ────────────────────────────────────
           true  → sin protección (modo desarrollo)
           false → activa la protección JWT               */
        const DEV_BYPASS_AUTH = true;
        /* ───────────────────────────────────────────────────────── */

        if (!DEV_BYPASS_AUTH) {
            const token = localStorage.getItem('access_token');
            const user  = JSON.parse(localStorage.getItem('user') || 'null');
            if (!token || !user || !['Director', 'Regente'].includes(user.tipo_usuario)) {
                window.location.replace('/login/');
            }
        }
    </script>
</head>
<body>

    <!-- ── Sidebar ──────────────────────────────────────────────── -->
    <aside class="sidebar">

        <!-- Perfil -->
        <div class="sidebar-profile">
            <div class="sidebar-avatar" id="sidebarAvatar">D</div>
            <div class="sidebar-profile-info">
                <span class="profile-name" id="profileName">Portal Director</span>
                <span class="profile-role" id="profileRole">Administración</span>
            </div>
        </div>

        <!-- Navegación -->
        <nav class="sidebar-nav" aria-label="Menú principal">

            <a href="#" class="nav-item active" data-title="Dashboard" aria-label="Dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" rx="1"/>
                    <rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/>
                    <rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
                <span class="nav-label">Dashboard</span>
            </a>

            <a href="#" class="nav-item" data-title="Asistencia" aria-label="Asistencia">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2"/>
                    <line x1="16" y1="2" x2="16" y2="6"/>
                    <line x1="8"  y1="2" x2="8"  y2="6"/>
                    <line x1="3"  y1="10" x2="21" y2="10"/>
                    <path d="M9 16l2 2 4-4"/>
                </svg>
                <span class="nav-label">Asistencia</span>
            </a>

            <a href="#" class="nav-item" data-title="Estudiantes" aria-label="Estudiantes">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                <span class="nav-label">Estudiantes</span>
            </a>

            <a href="#" class="nav-item" data-title="Citaciones" aria-label="Citaciones">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <line x1="10" y1="9"  x2="8" y2="9"/>
                </svg>
                <span class="nav-label">Citaciones</span>
            </a>

            <a href="#" class="nav-item" data-title="Usuarios" aria-label="Usuarios">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="8" r="4"/>
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                    <line x1="19" y1="8" x2="23" y2="8"/>
                    <line x1="21" y1="6" x2="21" y2="10"/>
                </svg>
                <span class="nav-label">Usuarios</span>
            </a>

        </nav>

        <!-- Logout -->
        <div class="sidebar-bottom">
            <button class="nav-item" id="btnLogout" aria-label="Cerrar sesión">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                <span class="nav-label">Cerrar</span>
            </button>
        </div>

    </aside>

    <!-- ── Backdrop móvil ───────────────────────────────────────── -->
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- ── Top bar ───────────────────────────────────────────────── -->
    <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
            <button class="btn-menu" id="btnMenu" aria-label="Abrir menú">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6"  x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <h1 class="page-title" id="pageTitle">Dashboard</h1>
        </div>
        <div class="topbar-actions">
            <button class="btn-icon" aria-label="Notificaciones">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                <span class="notif-badge"></span>
            </button>
        </div>
        </div>
    </header>

    <!-- ── Contenido principal ──────────────────────────────────── -->
    <main class="main-content" id="mainContent">
        <!-- Los paneles se cargarán aquí -->
    </main>

<script>
    const _user = JSON.parse(localStorage.getItem('user') || 'null');
    if (_user) {
        const nombre = `${_user.first_name || ''} ${_user.last_name || ''}`.trim() || _user.username;
        document.getElementById('sidebarAvatar').textContent = (_user.first_name || _user.username || 'D')[0].toUpperCase();
        document.getElementById('profileName').textContent   = nombre;
        document.getElementById('profileRole').textContent   = _user.tipo_usuario || 'Administración';
    }

    // ── Hamburguesa (móvil/tablet) ───────────────────────────────
    const sidebar  = document.querySelector('.sidebar');
    const backdrop = document.getElementById('sidebarBackdrop');
    const btnMenu  = document.getElementById('btnMenu');

    function openSidebar() {
        sidebar.classList.add('sidebar--open');
        backdrop.classList.add('visible');
    }
    function closeSidebar() {
        sidebar.classList.remove('sidebar--open');
        backdrop.classList.remove('visible');
    }

    btnMenu.addEventListener('click', () =>
        sidebar.classList.contains('sidebar--open') ? closeSidebar() : openSidebar()
    );
    backdrop.addEventListener('click', closeSidebar);

    // Cambio de sección: actualiza título y estado activo
    const pageTitle = document.getElementById('pageTitle');
    document.querySelectorAll('.nav-item[data-title]').forEach(item => {
        item.addEventListener('click', (e) => {
            e.preventDefault();
            // Actualizar título
            pageTitle.textContent = item.dataset.title;
            // Actualizar activo
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
        });
    });

    document.getElementById('btnLogout').addEventListener('click', () => {
        localStorage.removeItem('access_token');
        localStorage.removeItem('refresh_token');
        localStorage.removeItem('user');
        window.location.replace('/login/');
    });
</script>

</body>
</html>
