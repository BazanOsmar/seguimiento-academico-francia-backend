{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Dashboard — Francia "A"</title>
    <link rel="icon" type="image/png" href="{% static 'img/logo_francia.png' %}">
    <link rel="stylesheet" href="{% static 'css/director.css' %}">
    <link rel="stylesheet" href="{% static 'css/director_dashboard.css' %}">
    <script src="{% static 'js/api.js' %}"></script>

    <script src="{% static 'js/director_dashboard_inline.js' %}"></script>
</head>
<body>

    <!-- ── Sidebar ──────────────────────────────────────────────── -->
    <aside class="sidebar">

        <!-- Perfil -->
        <div class="sidebar-profile">
            <div class="sidebar-avatar">
                <img src="{% static 'img/logo_francia.png' %}" alt="Logo Francia A">
            </div>
            <div class="sidebar-profile-info">
                <span class="profile-name" id="profileName">Republica de Francia 'A'</span>
                <span class="profile-role" id="profileRole">Administración</span>
            </div>
        </div>

        <!-- Navegación -->
        <nav class="sidebar-nav" aria-label="Menú principal">

            <a href="/director/estudiantes/" class="nav-item" data-title="Estudiantes" aria-label="Estudiantes">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                    <path d="M6 12v5c3 3 9 3 12 0v-5"/>
                </svg>
                <span class="nav-label">Estudiantes</span>
            </a>

            <a href="/director/usuarios/" class="nav-item" data-title="Usuarios" aria-label="Usuarios">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                <span class="nav-label">Usuarios</span>
            </a>

            <a href="/director/asistencia/" class="nav-item" data-title="Asistencia" aria-label="Asistencia">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2"/>
                    <line x1="16" y1="2" x2="16" y2="6"/>
                    <line x1="8"  y1="2" x2="8"  y2="6"/>
                    <line x1="3"  y1="10" x2="21" y2="10"/>
                    <path d="M9 16l2 2 4-4"/>
                </svg>
                <span class="nav-label">Asistencia</span>
            </a>

            <a href="/director/control-diario/" class="nav-item" data-title="Control Diario" aria-label="Control Diario">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
                    <rect x="9" y="3" width="6" height="4" rx="1"/>
                    <path d="M9 12l2 2 4-4"/>
                </svg>
                <span class="nav-label">Control Diario</span>
            </a>

            <a href="/director/comunicados/" class="nav-item" data-title="Avisos" aria-label="Avisos">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 11l19-9v18L3 13v-2z"/>
                    <path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/>
                </svg>
                <span class="nav-label">Avisos</span>
            </a>

            <a href="#" class="nav-item" data-title="Calificaciones" aria-label="Calificaciones">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                </svg>
                <span class="nav-label">Académico</span>
            </a>

            <a href="/director/estadisticas/" class="nav-item" data-title="Estadísticas" aria-label="Estadísticas">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="20" x2="18" y2="10"/>
                    <line x1="12" y1="20" x2="12" y2="4"/>
                    <line x1="6"  y1="20" x2="6"  y2="14"/>
                </svg>
                <span class="nav-label">Estadísticas</span>
            </a>

        </nav>

        <!-- Logout -->
        <div class="sidebar-bottom">
            <a href="/director/mi-perfil/" class="nav-item" aria-label="Mi Perfil">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span class="nav-label">Mi Perfil</span>
            </a>
            <button class="nav-item" id="btnLogout" aria-label="Cerrar sesión">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                <span class="nav-label">Cerrar</span>
            </button>
        </div>

    </aside>

    <!-- ── Backdrop móvil ───────────────────────────────────────── -->
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- ── Top bar ───────────────────────────────────────────────── -->
    <header class="topbar">
        <div class="director-dashboard-inline-style-1">
            <button class="btn-menu" id="btnMenu" aria-label="Abrir menú">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6"  x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <h1 class="page-title" id="pageTitle">Dashboard</h1>
        </div>
        <div class="topbar-actions">
            <button class="btn-icon" id="btnBroadcast" aria-label="Enviar comunicado">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
            </button>
            {% include 'director/_notif_bell.html' %}
        </div>
        </div>
    </header>

    <!-- ── Contenido principal ──────────────────────────────────── -->
    <main class="main-content" id="mainContent">
        <!-- Los paneles se cargarán aquí -->
    </main>

    <!-- ── Modal Broadcast ──────────────────────────────────────── -->
    <div class="modal-backdrop" id="broadcastBackdrop">
        <div class="modal modal--wide">
            <div class="modal-icon director-dashboard-inline-style-2">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
            </div>
            <p class="modal-title">Enviar comunicado</p>
            <p class="modal-subtitle">El mensaje llegará a todos los dispositivos registrados.</p>

            <div class="form-group director-dashboard-inline-style-3">
                <label class="form-label">Título</label>
                <input id="broadcastTitulo" class="form-input" type="text"
                       placeholder="Ej: Reunión de padres" maxlength="80">
            </div>
            <div class="form-group director-dashboard-inline-style-3">
                <label class="form-label">Mensaje</label>
                <textarea id="broadcastCuerpo" class="form-input form-textarea"
                          placeholder="Escribe el mensaje aquí..." maxlength="300" rows="4"></textarea>
            </div>

            <p id="broadcastError" class="form-error director-dashboard-inline-style-4"></p>

            <div class="director-dashboard-inline-style-5">
                <button id="broadcastCancelar" class="btn-secondary director-dashboard-inline-style-6">Cancelar</button>
                <button id="broadcastEnviar" class="btn-primary director-dashboard-inline-style-6" >Enviar</button>
            </div>
        </div>
    </div>

<script src="{% static 'js/director_dashboard_inline_2.js' %}"></script>

<!-- Broadcast -->
<script src="{% static 'js/director_dashboard_inline_3.js' %}"></script>

<!-- Firebase Cloud Messaging -->
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-messaging-compat.js"></script>
<script src="{% static 'js/fcm.js' %}"></script>
<script src="{% static 'js/director_dashboard_inline_4.js' %}"></script>
<script src="{% static 'js/notif_bell.js' %}"></script>

</body>
</html>
