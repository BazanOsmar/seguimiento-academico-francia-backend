{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Notas del Curso — Francia "A"</title>
    <link rel="icon" type="image/png" href="{% static 'img/logo_francia.png' %}">
    <link rel="stylesheet" href="{% static 'css/director.css' %}">
    <script src="{% static 'js/api.js' %}"></script>
    <script src="{% static 'js/director_notas_curso_mes_inline.js' %}"></script>
    <link rel="stylesheet" href="{% static 'css/director_notas_curso_mes.css' %}">
    <link rel="stylesheet" href="{% static 'css/director_notas_curso.css' %}">
</head>
<body>

    <!-- ── Sidebar ──────────────────────────────────────────────── -->
    <aside class="sidebar">
        <div class="sidebar-profile">
            <div class="sidebar-avatar">
                <img src="{% static 'img/logo_francia.png' %}" alt="Logo Francia A">
            </div>
            <div class="sidebar-profile-info">
                <span class="profile-name" id="profileName">Republica de Francia 'A'</span>
                <span class="profile-role" id="profileRole">Administración</span>
            </div>
        </div>
        <nav class="sidebar-nav" aria-label="Menú principal">
            <a href="/director/estudiantes/" class="nav-item" aria-label="Estudiantes">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                <span class="nav-label">Estudiantes</span>
            </a>
            <a href="/director/usuarios/" class="nav-item" aria-label="Usuarios">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span class="nav-label">Usuarios</span>
            </a>
            <a href="/director/academico/" class="nav-item active" aria-label="Académico">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                <span class="nav-label">Académico</span>
            </a>
        </nav>
        <div class="sidebar-bottom">
            <button class="nav-item" id="btnLogout" aria-label="Cerrar sesión">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span class="nav-label">Cerrar</span>
            </button>
        </div>
    </aside>

    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- ── Top bar ──────────────────────────────────────────────── -->
    <header class="topbar">
        <div class="director-notas-curso-mes-inline-style-1">
            <button class="btn-menu" id="btnMenu" aria-label="Abrir menú">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6"  x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <h1 class="page-title" id="pageTitle">Notas del Curso</h1>
        </div>
        <div class="topbar-actions">{% include 'director/_notif_bell.html' %}</div>
    </header>

    <!-- ── Main ─────────────────────────────────────────────────── -->
    <main class="main-content">
        <div class="content-wrap nm-wrap">

            <!-- Barra de regreso -->
            <div class="nm-back-bar">
                <a href="/director/academico/" class="nm-back-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                    Volver a Académico
                </a>
            </div>

            <!-- Spinner inicial -->
            <div id="nmLoader" class="nm-spinner"></div>

            <!-- Contenido (oculto hasta que cargue) -->
            <div id="nmContent" class="director-notas-curso-mes-inline-style-2">

                <!-- Header con metadata -->
                <div class="nm-header" id="nmHeader">
                    <div class="nm-avatar" id="nmAvatar">–</div>
                    <div class="nm-header-info">
                        <div class="nm-header-title" id="nmHeaderTitle">–</div>
                        <div class="nm-header-tags" id="nmHeaderTags"></div>
                    </div>
                    <span class="nm-readonly-badge">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        Notas subidas
                    </span>
                    <button class="nm-changes-btn director-notas-curso-mes-inline-style-2" id="nmCambiosBtn" type="button">
                        Ver cambios
                    </button>
                </div>

                <div class="nm-data-shell">
                    <!-- Stats -->
                    <div class="nm-stats" id="nmStats"></div>

                    <!-- Tabs de trimestre -->
                    <div class="nm-trim-tabs" id="nmTrimTabs"></div>

                    <!-- Tabla -->
                    <div class="nm-table-wrap">
                        <div class="nm-table-scroll" id="nmTableScroll"></div>
                    </div>
                </div>

            </div>

            <!-- Error state -->
            <div id="nmError" class="nm-error director-notas-curso-mes-inline-style-2">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <strong id="nmErrorTitle">No se encontraron notas</strong>
                <span id="nmErrorMsg">Las notas de este curso y mes no están disponibles.</span>
            </div>

        </div>
    </main>

    <script src="{% static 'js/director_notas_curso_mes_inline_2.js' %}"></script>
<script src="{% static 'js/notif_bell.js' %}"></script>
</body>
</html>
