{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Notas del Curso — Francia "A"</title>
    <link rel="icon" type="image/png" href="{% static 'img/logo_francia.png' %}">
    <link rel="stylesheet" href="{% static 'css/director.css' %}">
    <script src="{% static 'js/api.js' %}"></script>
    <script>
        const token = localStorage.getItem('access_token');
        const user  = JSON.parse(localStorage.getItem('user') || 'null');
        if (!token || !user || !['Director'].includes(user.tipo_usuario)) {
            window.location.replace('/login/');
        }
    </script>
    <style>
        /* ── Layout ──────────────────────────────────────────────────── */
        .nm-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        /* ── Topbar override ─────────────────────────────────────────── */
        .nm-back-bar {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 22px;
            padding-top: 4px;
        }
        .nm-back-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 6px 13px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: color .15s, border-color .15s, background .15s;
            text-decoration: none;
        }
        .nm-back-btn:hover {
            color: var(--accent-text);
            border-color: var(--accent);
            background: var(--accent-dim);
        }
        .nm-back-btn svg { flex-shrink: 0; }

        /* ── Header ──────────────────────────────────────────────────── */
        .nm-header {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-card);
            padding: 22px 26px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            gap: 18px;
            position: relative;
            overflow: hidden;
        }
        .nm-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--accent), #818cf8);
        }
        .nm-header::after {
            content: '';
            position: absolute;
            top: -50px; right: -40px;
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(59,130,246,.1) 0%, transparent 65%);
            pointer-events: none;
        }
        .nm-avatar {
            width: 52px; height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; font-weight: 800;
            flex-shrink: 0;
            box-shadow: 0 4px 14px rgba(59,130,246,.35);
            position: relative; z-index: 1;
        }
        .nm-header-info { flex: 1; min-width: 0; position: relative; z-index: 1; }
        .nm-header-title {
            font-size: 1.3rem; font-weight: 800;
            color: var(--text-primary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-bottom: 6px;
        }
        .nm-header-tags {
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
        }
        .nm-tag {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 0.7rem; font-weight: 700;
            letter-spacing: .03em;
        }
        .nm-tag--blue   { background: rgba(59,130,246,.14);  color: var(--accent-text); }
        .nm-tag--green  { background: rgba(34,197,94,.13);   color: #4ade80; }
        .nm-tag--purple { background: rgba(129,140,248,.15); color: #a5b4fc; }
        .nm-tag--gray   { background: var(--bg-surface); border: 1px solid var(--border-subtle); color: var(--text-muted); }
        .nm-tag svg { width: 11px; height: 11px; flex-shrink: 0; }

        .nm-readonly-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 11px;
            background: rgba(34,197,94,.13);
            color: #4ade80;
            border: 1px solid rgba(34,197,94,.22);
            border-radius: 50px;
            font-size: 0.67rem; font-weight: 700;
            letter-spacing: .05em;
            margin-left: auto;
            flex-shrink: 0;
            position: relative; z-index: 1;
        }
        .nm-readonly-badge svg { width: 11px; height: 11px; }

        /* ── Trim tabs ───────────────────────────────────────────────── */
        .nm-trim-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .nm-trim-btn {
            padding: 7px 18px;
            border-radius: 8px;
            border: none;
            font-family: inherit;
            font-size: .82rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s, color .15s;
            background: var(--bg-input);
            color: var(--text-secondary);
        }
        .nm-trim-btn.active {
            background: var(--accent);
            color: #fff;
        }
        .nm-trim-btn:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        /* ── Tabla ───────────────────────────────────────────────────── */
        .nm-table-wrap {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-card);
            overflow: hidden;
        }
        .nm-table-scroll {
            overflow-x: auto;
        }
        .nm-table-scroll::-webkit-scrollbar { height: 4px; }
        .nm-table-scroll::-webkit-scrollbar-track { background: transparent; }
        .nm-table-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

        .nm-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }
        .nm-table th, .nm-table td {
            padding: 0;
            border-bottom: 1px solid var(--border-subtle);
        }
        /* Grupo de dimensión */
        .nm-th-group {
            padding: 7px 10px;
            font-size: 0.6rem;
            font-weight: 800;
            letter-spacing: .08em;
            text-align: center;
            border-right: 2px solid var(--border-subtle);
        }
        .nm-th-group--saber  { background: rgba(59,130,246,.08);  color: var(--accent-text); }
        .nm-th-group--hacer  { background: rgba(129,140,248,.1);  color: #a5b4fc; }
        .nm-th-group--ser    { background: rgba(34,197,94,.08);   color: #4ade80; }
        /* Headers rotados */
        .nm-th-rot {
            height: 96px;
            width: 46px;
            min-width: 46px;
            border-right: 1px solid var(--border-subtle);
            text-align: center;
            vertical-align: bottom;
            padding: 0 2px 6px;
        }
        /* El wrapper rota como unidad — los spans no tienen writing-mode propio */
        .nm-th-activity {
            display: inline-flex;
            flex-direction: row;          /* en vertical-rl, row = top→bottom visual */
            align-items: center;          /* centrado horizontal en la celda */
            gap: 3px;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            max-height: 84px;
            overflow: hidden;
        }
        .nm-th-date {
            font-size: 0.72rem;
            font-weight: 800;
            color: var(--accent-text);
            white-space: nowrap;
            flex-shrink: 0;
            letter-spacing: .02em;
        }
        .nm-th-title {
            font-size: 0.66rem;
            font-weight: 600;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 72px;   /* se convierte en altura máxima al rotar */
        }
        /* Celdas fijas */
        .nm-td-nro {
            width: 46px;
            min-width: 46px;
            text-align: center;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-muted);
            padding: 9px 6px;
            border-right: 1px solid var(--border-subtle);
        }
        .nm-td-name {
            min-width: 220px;
            max-width: 260px;
            padding: 9px 14px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-right: 2px solid var(--border-subtle);
        }
        .nm-td-score {
            width: 46px;
            min-width: 46px;
            text-align: center;
            padding: 9px 4px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
            border-right: 1px solid var(--border-subtle);
        }
        .nm-td-score.is-empty { color: var(--text-muted); font-weight: 400; }
        .nm-td-avg {
            width: 64px;
            min-width: 64px;
            text-align: center;
            padding: 9px 8px;
            font-size: 0.82rem;
            font-weight: 700;
        }
        .nm-td-avg--ok   { color: #4ade80; }
        .nm-td-avg--warn { color: #fbbf24; }
        .nm-td-avg--bad  { color: #f87171; }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,.015); }

        /* ── Headers fijos de nro y nombre ──────────────────────────── */
        .nm-th-nro {
            width: 46px; min-width: 46px;
            text-align: center;
            padding: 9px 6px;
            font-size: 0.62rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--text-muted);
            background: var(--bg-app);
            border-right: 1px solid var(--border-subtle);
            border-bottom: 2px solid var(--border-subtle);
        }
        .nm-th-name {
            min-width: 220px; max-width: 260px;
            padding: 9px 14px;
            font-size: 0.62rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--text-muted);
            background: var(--bg-app);
            text-align: left;
            border-right: 2px solid var(--border-subtle);
            border-bottom: 2px solid var(--border-subtle);
        }
        .nm-th-avg {
            width: 64px; min-width: 64px;
            padding: 9px 8px;
            font-size: 0.62rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--text-muted);
            background: var(--bg-app);
            text-align: center;
            border-bottom: 2px solid var(--border-subtle);
        }

        /* ── Stats bar ───────────────────────────────────────────────── */
        .nm-stats {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .nm-stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-card);
            padding: 14px 18px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 140px;
        }
        .nm-stat-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); }
        .nm-stat-val   { font-size: 1.3rem; font-weight: 800; color: var(--text-primary); }
        .nm-stat-val--ok   { color: #4ade80; }
        .nm-stat-val--warn { color: #fbbf24; }
        .nm-stat-val--bad  { color: #f87171; }

        /* ── Spinner / empty ─────────────────────────────────────────── */
        .nm-spinner {
            display: flex; align-items: center; justify-content: center;
            padding: 80px 20px;
        }
        .nm-spinner::after {
            content: '';
            width: 32px; height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: nmSpin .7s linear infinite;
        }
        @keyframes nmSpin { to { transform: rotate(360deg); } }

        .nm-error {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 10px; padding: 80px 20px;
            color: var(--text-muted); text-align: center;
        }
        .nm-error svg { opacity: .3; }
        .nm-error strong { font-size: 1rem; font-weight: 700; color: var(--text-secondary); }
        .nm-error span { font-size: 0.82rem; }
    </style>
    <link rel="stylesheet" href="{% static 'css/director_notas_curso.css' %}">
</head>
<body>

    <!-- ── Sidebar ──────────────────────────────────────────────── -->
    <aside class="sidebar">
        <div class="sidebar-profile">
            <div class="sidebar-avatar">
                <img src="{% static 'img/logo_francia.png' %}" alt="Logo Francia A">
            </div>
            <div class="sidebar-profile-info">
                <span class="profile-name" id="profileName">Republica de Francia 'A'</span>
                <span class="profile-role" id="profileRole">Administración</span>
            </div>
        </div>
        <nav class="sidebar-nav" aria-label="Menú principal">
            <a href="/director/estudiantes/" class="nav-item" aria-label="Estudiantes">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                <span class="nav-label">Estudiantes</span>
            </a>
            <a href="/director/usuarios/" class="nav-item" aria-label="Usuarios">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span class="nav-label">Usuarios</span>
            </a>
            <a href="/director/academico/" class="nav-item active" aria-label="Académico">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                <span class="nav-label">Académico</span>
            </a>
        </nav>
        <div class="sidebar-bottom">
            <button class="nav-item" id="btnLogout" aria-label="Cerrar sesión">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span class="nav-label">Cerrar</span>
            </button>
        </div>
    </aside>

    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- ── Top bar ──────────────────────────────────────────────── -->
    <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
            <button class="btn-menu" id="btnMenu" aria-label="Abrir menú">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6"  x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <h1 class="page-title" id="pageTitle">Notas del Curso</h1>
        </div>
        <div class="topbar-actions">{% include 'director/_notif_bell.html' %}</div>
    </header>

    <!-- ── Main ─────────────────────────────────────────────────── -->
    <main class="main-content">
        <div class="content-wrap nm-wrap">

            <!-- Barra de regreso -->
            <div class="nm-back-bar">
                <a href="/director/academico/" class="nm-back-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                    Volver a Académico
                </a>
            </div>

            <!-- Spinner inicial -->
            <div id="nmLoader" class="nm-spinner"></div>

            <!-- Contenido (oculto hasta que cargue) -->
            <div id="nmContent" style="display:none;">

                <!-- Header con metadata -->
                <div class="nm-header" id="nmHeader">
                    <div class="nm-avatar" id="nmAvatar">–</div>
                    <div class="nm-header-info">
                        <div class="nm-header-title" id="nmHeaderTitle">–</div>
                        <div class="nm-header-tags" id="nmHeaderTags"></div>
                    </div>
                    <span class="nm-readonly-badge">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        Notas subidas
                    </span>
                </div>

                <div class="nm-data-shell">
                    <!-- Stats -->
                    <div class="nm-stats" id="nmStats"></div>

                    <!-- Tabs de trimestre -->
                    <div class="nm-trim-tabs" id="nmTrimTabs"></div>

                    <!-- Tabla -->
                    <div class="nm-table-wrap">
                        <div class="nm-table-scroll" id="nmTableScroll"></div>
                    </div>
                </div>

            </div>

            <!-- Error state -->
            <div id="nmError" style="display:none;" class="nm-error">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <strong id="nmErrorTitle">No se encontraron notas</strong>
                <span id="nmErrorMsg">Las notas de este curso y mes no están disponibles.</span>
            </div>

        </div>
    </main>

    <script>
    'use strict';

    // ── Sidebar ───────────────────────────────────────────────────────
    (function() {
        const sidebar  = document.querySelector('.sidebar');
        const backdrop = document.getElementById('sidebarBackdrop');
        const btnMenu  = document.getElementById('btnMenu');
        const isDesktop = () => window.matchMedia('(min-width: 769px)').matches;
        let timer;
        sidebar.addEventListener('mouseenter', () => { clearTimeout(timer); if (isDesktop()) sidebar.classList.add('sidebar--expanded'); });
        sidebar.addEventListener('mouseleave', () => { if (isDesktop()) timer = setTimeout(() => sidebar.classList.remove('sidebar--expanded'), 200); });
        btnMenu.addEventListener('click', () => {
            sidebar.classList.contains('sidebar--open')
                ? (sidebar.classList.remove('sidebar--open'), backdrop.classList.remove('visible'))
                : (sidebar.classList.add('sidebar--open'), backdrop.classList.add('visible'));
        });
        backdrop.addEventListener('click', () => { sidebar.classList.remove('sidebar--open'); backdrop.classList.remove('visible'); });
        document.getElementById('btnLogout').addEventListener('click', () => {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('user');
            window.location.replace('/login/');
        });
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (user) document.getElementById('profileRole').textContent = user.tipo_usuario || 'Director';
    })();

    // ── Parámetros de URL ─────────────────────────────────────────────
    const _params = new URLSearchParams(window.location.search);
    const _pcId   = parseInt(_params.get('pc_id') || '0', 10);
    const _mes    = parseInt(_params.get('mes')   || '0', 10);

    // ── Estado ───────────────────────────────────────────────────────
    let _headersPorTrim = {};
    let _metadata       = {};
    let _trimActivo     = '';

    const _TRIM_ORDER  = ['1TRIM', '2TRIM', '3TRIM'];
    const _TRIM_LABELS = { '1TRIM': '1er Trimestre', '2TRIM': '2do Trimestre', '3TRIM': '3er Trimestre' };
    const _DIM_MAX_POINTS = { ser: 10, saber: 45, hacer: 40 };
    const _DIM_DEFS = [
        { key: 'saber', label: 'SABER', css: 'saber' },
        { key: 'hacer', label: 'HACER', css: 'hacer' },
        { key: 'ser',   label: 'SER',   css: 'ser'   },
    ];

    // ── Helpers ───────────────────────────────────────────────────────
    function _esc(s) {
        return String(s ?? '')
            .replace(/&/g, '&amp;').replace(/</g, '&lt;')
            .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function _fmt1(v) {
        return (typeof v === 'number' && isFinite(v)) ? v.toFixed(1) : '–';
    }
    function _avg(arr) {
        const finite = arr.filter(n => typeof n === 'number' && isFinite(n));
        return finite.length ? finite.reduce((a, b) => a + b, 0) / finite.length : NaN;
    }
    function _shortLabel(titulo, idx) {
        if (!titulo) return `Act.${idx + 1}`;
        // Intentar extraer fecha (dd/mm/yyyy)
        const m = titulo.match(/(\d{1,2})[/\-](\d{1,2})[/\-](\d{2,4})/);
        if (m) return `${String(m[1]).padStart(2,'0')}/${String(m[2]).padStart(2,'0')}`;
        return titulo.length > 12 ? titulo.slice(0, 12) + '…' : titulo;
    }
    function _iniciales(nombre) {
        const partes = (nombre || '').trim().split(/\s+/);
        return ((partes[0]?.[0] || '') + (partes[partes.length - 1]?.[0] || '')).toUpperCase() || '?';
    }

    function _activityHeaderMeta(titulo, idx) {
        const fallback = { date: `Act. ${idx + 1}`, title: 'Actividad' };
        if (!titulo) return fallback;

        const clean = String(titulo).replace(/\s+/g, ' ').trim();
        const m = clean.match(/(\d{1,2})[/\-](\d{1,2})(?:[/\-](\d{2,4}))?/);
        const date = m ? `${String(m[1]).padStart(2,'0')}/${String(m[2]).padStart(2,'0')}` : `Act. ${idx + 1}`;
        const titleRaw = m
            ? clean.replace(m[0], '').replace(/^[\s\-:|,.]+|[\s\-:|,.]+$/g, '')
            : clean;
        const title = titleRaw
            ? (titleRaw.length > 22 ? titleRaw.slice(0, 22) + '…' : titleRaw)
            : 'Actividad';

        return { date, title };
    }

    // ── Bootstrap ─────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
        if (!_pcId || !_mes) {
            _mostrarError('Parámetros inválidos', 'Falta pc_id o mes en la URL.');
            return;
        }
        await _cargar();
    });

    async function _cargar() {
        const { ok, data } = await fetchAPI(
            `/api/academics/director/notas-mes-detalle/?pc_id=${_pcId}&mes=${_mes}`
        );

        document.getElementById('nmLoader').style.display = 'none';

        if (!ok || !data.ya_subidas) {
            _mostrarError(
                'Sin notas disponibles',
                ok ? 'Este curso no tiene notas cargadas para el mes seleccionado.' : 'Error al conectar con el servidor.'
            );
            return;
        }

        _headersPorTrim = data.headers_por_trim || {};
        _metadata       = data.metadata || {};

        _poblarHeader();
        _poblarTrimTabs();
        _trimActivo = _TRIM_ORDER.find(t => _headersPorTrim[t]) || Object.keys(_headersPorTrim)[0] || '';
        _renderTabla(_trimActivo);
        _activarTab(_trimActivo);

        document.getElementById('nmContent').style.display = '';
        document.getElementById('pageTitle').textContent =
            `${_metadata.materia || '–'} · ${_metadata.curso || '–'}`;
    }

    function _mostrarError(titulo, msg) {
        document.getElementById('nmLoader').style.display   = 'none';
        document.getElementById('nmContent').style.display  = 'none';
        document.getElementById('nmError').style.display    = '';
        document.getElementById('nmErrorTitle').textContent = titulo;
        document.getElementById('nmErrorMsg').textContent   = msg;
    }

    function _poblarHeader() {
        const { profesor, materia, curso, mes_nombre, gestion } = _metadata;
        document.getElementById('nmAvatar').textContent = _iniciales(profesor || '');
        document.getElementById('nmHeaderTitle').textContent = profesor || '–';

        const tags = [
            { label: materia,           cls: 'nm-tag--blue'   },
            { label: curso,             cls: 'nm-tag--purple' },
            { label: mes_nombre || '',  cls: 'nm-tag--gray'   },
            { label: String(gestion || ''), cls: 'nm-tag--gray' },
        ];
        document.getElementById('nmHeaderTags').innerHTML = tags
            .filter(t => t.label)
            .map(t => `<span class="nm-tag ${t.cls}">${_esc(t.label)}</span>`)
            .join('');
    }

    function _poblarTrimTabs() {
        const cont = document.getElementById('nmTrimTabs');
        cont.innerHTML = _TRIM_ORDER.map(t => {
            const tiene = !!_headersPorTrim[t];
            return `<button class="nm-trim-btn" data-trim="${t}" ${tiene ? '' : 'disabled'} onclick="_activarTab('${t}')">${_TRIM_LABELS[t]}</button>`;
        }).join('');
    }

    function _activarTab(trim) {
        _trimActivo = trim;
        document.querySelectorAll('.nm-trim-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.trim === trim);
        });
        _renderTabla(trim);
    }

    function _renderTabla(trimKey) {
        const scroll = document.getElementById('nmTableScroll');
        const trimData = _headersPorTrim[trimKey];
        if (!trimData) { scroll.innerHTML = ''; return; }

        // Dimensiones con datos
        const dims = _DIM_DEFS
            .map(d => ({ ...d, cols: Array.isArray(trimData[d.key]) ? trimData[d.key] : [] }))
            .filter(d => d.cols.length);

        if (!dims.length) { scroll.innerHTML = ''; return; }

        // Construir mapa de filas: rowKey → { nro, nombre, values }
        const rowMap = new Map();
        const allCellKeys = [];

        dims.forEach(dim => {
            dim.cols.forEach((col, i) => {
                const ck = `${dim.key}-${i}`;
                col.__ck = ck;
                allCellKeys.push(ck);
                (col.notas || []).forEach(n => {
                    const rk = `${n.nro}|${n.nombre}`;
                    if (!rowMap.has(rk)) rowMap.set(rk, { nro: n.nro, nombre: n.nombre, vals: {} });
                    rowMap.get(rk).vals[ck] = Number(n.nota);
                });
            });
        });

        const rows = [...rowMap.values()].sort((a, b) => {
            const na = Number(a.nro) || 0, nb = Number(b.nro) || 0;
            return na - nb || String(a.nombre).localeCompare(String(b.nombre));
        });

        // Calcular promedio como en notas_mensuales:
        // cada dimensión promedia sus actividades y luego se suman SER + SABER + HACER.
        // Si una dimensión no llegó, aporta 0.
        const rowsWithAvg = rows.map(r => {
            const dimScores = { ser: 0, saber: 0, hacer: 0 };

            dims.forEach(d => {
                const totalDim = d.cols.reduce((sum, col) => {
                    const val = r.vals[col.__ck];
                    return sum + (isFinite(val) ? Number(val) : 0);
                }, 0);
                dimScores[d.key] = d.cols.length ? totalDim / d.cols.length : 0;
            });

            const ser   = Math.min(dimScores.ser, _DIM_MAX_POINTS.ser);
            const saber = Math.min(dimScores.saber, _DIM_MAX_POINTS.saber);
            const hacer = Math.min(dimScores.hacer, _DIM_MAX_POINTS.hacer);

            return {
                ...r,
                avg: ser + saber + hacer,
            };
        });

        const overallAvg = _avg(rowsWithAvg.map(r => r.avg).filter(v => isFinite(v)));
        const riskCount  = rowsWithAvg.filter(r => isFinite(r.avg) && r.avg < 60).length;

        // Actualizar stats
        _renderStats(overallAvg, riskCount, rowsWithAvg.length);

        // Colgroup
        const totalCols = dims.reduce((s, d) => s + d.cols.length, 0);
        const colgroup = `<colgroup>
            <col style="width:46px">
            <col style="width:240px">
            ${dims.map(d => d.cols.map(() => '<col>').join('')).join('')}
            <col style="width:70px">
        </colgroup>`;

        // Fila 1: grupos de dimensión
        const groupRow = `<tr>
            <th class="nm-th-nro" rowspan="2">#</th>
            <th class="nm-th-name" rowspan="2">Estudiante</th>
            ${dims.map(d => `<th class="nm-th-group nm-th-group--${d.css}" colspan="${d.cols.length}">${d.label}</th>`).join('')}
            <th class="nm-th-avg" rowspan="2">Prom.</th>
        </tr>`;

        // Fila 2: headers rotados
        const headRow = `<tr>
            ${dims.map(d => d.cols.map((col, i) => {
                const meta = _activityHeaderMeta(col.titulo, i);
                return `
                <th class="nm-th-rot" title="${_esc(col.titulo || '')}">
                    <div class="nm-th-activity">
                        <span class="nm-th-date">${_esc(meta.date)}</span>
                        <span class="nm-th-title">${_esc(meta.title)}</span>
                    </div>
                </th>`;
            }).join('')).join('')}
        </tr>`;

        // Filas de datos
        const dataRows = rowsWithAvg.map(r => {
            const scoresCells = dims.map(d => d.cols.map(col => {
                const v = r.vals[col.__ck];
                return isFinite(v)
                    ? `<td class="nm-td-score">${_fmt1(v)}</td>`
                    : `<td class="nm-td-score is-empty">–</td>`;
            }).join('')).join('');

            const avgClass = !isFinite(r.avg) ? '' : r.avg >= 70 ? 'nm-td-avg--ok' : r.avg >= 50 ? 'nm-td-avg--warn' : 'nm-td-avg--bad';

            return `<tr>
                <td class="nm-td-nro">${String(r.nro).padStart(2,'0')}</td>
                <td class="nm-td-name">${_esc(r.nombre)}</td>
                ${scoresCells}
                <td class="nm-td-avg ${avgClass}">${_fmt1(r.avg)}</td>
            </tr>`;
        }).join('');

        scroll.innerHTML = `<table class="nm-table">${colgroup}<thead>${groupRow}${headRow}</thead><tbody>${dataRows}</tbody></table>`;
    }

    function _renderStats(overallAvg, riskCount, total) {
        const avgClass = !isFinite(overallAvg) ? '' : overallAvg >= 70 ? 'nm-stat-val--ok' : overallAvg >= 50 ? 'nm-stat-val--warn' : 'nm-stat-val--bad';
        document.getElementById('nmStats').innerHTML = `
            <div class="nm-stat-card">
                <span class="nm-stat-label">Promedio general</span>
                <span class="nm-stat-val ${avgClass}">${_fmt1(overallAvg)}</span>
            </div>
            <div class="nm-stat-card">
                <span class="nm-stat-label">Total estudiantes</span>
                <span class="nm-stat-val">${total}</span>
            </div>
            <div class="nm-stat-card">
                <span class="nm-stat-label">En riesgo (&lt;60)</span>
                <span class="nm-stat-val ${riskCount > 0 ? 'nm-stat-val--warn' : 'nm-stat-val--ok'}">${riskCount}</span>
            </div>
        `;
    }
    </script>
<script src="{% static 'js/notif_bell.js' %}"></script>
</body>
</html>
