{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Página no encontrada — Francia "A"</title>
    <link rel="icon" type="image/png" href="{% static 'img/logo_francia.png' %}">
    <link rel="stylesheet" href="{% static 'css/404.css' %}">
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="{% static 'img/logo_francia.png' %}" alt="Logo Francia A">
        </div>

        <div class="code">404</div>

        <div class="divider"></div>

        <p class="title">Página no encontrada</p>

        <p class="desc">
            La dirección que intentas visitar no existe o fue movida.
            Verifica la URL o regresa al inicio de sesión.
        </p>

        <a href="/login/" class="btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                <polyline points="10 17 15 12 10 7"/>
                <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Ir al inicio de sesión
        </a>
    </div>
</body>
</html>
