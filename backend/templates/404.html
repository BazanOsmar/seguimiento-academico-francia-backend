{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Página no encontrada — Francia "A"</title>
    <link rel="icon" type="image/png" href="{% static 'img/logo_francia.png' %}">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0d1726;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: #132034;
            border: 1px solid #1c3050;
            border-radius: 20px;
            padding: 56px 48px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .logo {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid #243d5e;
            background: #1a2d45;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 8px;
        }
        .logo img { width: 100%; height: 100%; object-fit: contain; }

        .code {
            font-size: 6rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #f1f5f9;
        }

        .desc {
            font-size: 0.9rem;
            color: #64748b;
            line-height: 1.6;
            max-width: 320px;
        }

        .divider {
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border-radius: 99px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 13px 32px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.18s, transform 0.15s;
        }
        .btn:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }
        .btn:active { transform: translateY(0); }

        @media (max-width: 480px) {
            .card { padding: 40px 24px; }
            .code { font-size: 4.5rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="{% static 'img/logo_francia.png' %}" alt="Logo Francia A">
        </div>

        <div class="code">404</div>

        <div class="divider"></div>

        <p class="title">Página no encontrada</p>

        <p class="desc">
            La dirección que intentas visitar no existe o fue movida.
            Verifica la URL o regresa al inicio de sesión.
        </p>

        <a href="/login/" class="btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                <polyline points="10 17 15 12 10 7"/>
                <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Ir al inicio de sesión
        </a>
    </div>
</body>
</html>
