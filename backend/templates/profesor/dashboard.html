{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Panel Profesor — Francia "A"</title>
    <link rel="icon" type="image/png" href="{% static 'img/logo_francia.png' %}">
    <link rel="stylesheet" href="{% static 'css/director.css' %}">
    <script src="{% static 'js/api.js' %}"></script>

    <script>
        const token = localStorage.getItem('access_token');
        const user  = JSON.parse(localStorage.getItem('user') || 'null');
        if (!token || !user || user.tipo_usuario !== 'Profesor') {
            window.location.replace('/login/');
        }
    </script>

    <style>
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── Drop zone ───────────────────────────────────────────── */
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 48px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color .2s, background .2s;
            background: var(--bg-card);
        }
        .drop-zone:hover,
        .drop-zone--over {
            border-color: var(--accent);
            background: var(--accent-dim, rgba(99,102,241,.07));
        }
        .drop-zone--has-file { border-color: var(--success); }
        .drop-zone__icon { color: var(--text-muted); margin-bottom: 12px; }
        .drop-zone__text {
            color: var(--text-muted);
            font-size: .875rem;
            line-height: 1.5;
        }
        .drop-zone__filename {
            display: none;
            margin-top: 10px;
            font-size: .8rem;
            color: var(--success);
            font-weight: 600;
            word-break: break-all;
        }

        /* ── Citaciones layout ───────────────────────────────────── */
        .cit-grid {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 20px;
            align-items: start;
        }
        @media (max-width: 900px) {
            .cit-grid { grid-template-columns: 1fr; }
        }

        /* ── Historial ───────────────────────────────────────────── */
        .historial-spinner {
            display: flex;
            justify-content: center;
            padding: 32px 0;
        }
        .spinner {
            width: 28px; height: 28px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .historial-vacio {
            text-align: center;
            color: var(--text-muted);
            padding: 32px 0;
            font-size: .9rem;
        }

        /* ── Badge ───────────────────────────────────────────────── */
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 99px;
            font-size: .75rem;
            font-weight: 600;
        }
        .badge--warning  { background: rgba(234,179,8,.15);  color: #ca8a04; }
        .badge--success  { background: rgba(34,197,94,.15);  color: #16a34a; }
        .badge--error    { background: rgba(239,68,68,.15);   color: #dc2626; }
        .badge--neutral  { background: var(--bg-hover);       color: var(--text-muted); }
    </style>
</head>
<body>

    <!-- ── Sidebar ──────────────────────────────────────────────── -->
    <aside class="sidebar">
        <div class="sidebar-profile">
            <div class="sidebar-avatar">
                <img src="{% static 'img/logo_francia.png' %}" alt="Logo Francia A">
            </div>
            <div class="sidebar-profile-info">
                <span class="profile-name" id="profileName">Profesor</span>
                <span class="profile-role" id="profileRole">Docente</span>
            </div>
        </div>

        <nav class="sidebar-nav" aria-label="Menú principal">
            <button class="nav-item active" id="sideNotas" aria-label="Notas">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
                <span class="nav-label">Notas</span>
            </button>
            <button class="nav-item" id="sideCitaciones" aria-label="Citaciones">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
                <span class="nav-label">Citaciones</span>
            </button>
        </nav>

        <div class="sidebar-bottom">
            <button class="nav-item" id="btnLogout" aria-label="Cerrar sesión">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                <span class="nav-label">Cerrar</span>
            </button>
        </div>
    </aside>

    <!-- ── Backdrop móvil ───────────────────────────────────────── -->
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- ── Top bar ───────────────────────────────────────────────── -->
    <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
            <button class="btn-menu" id="btnMenu" aria-label="Abrir menú">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6"  x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <h1 class="page-title">Panel Profesor</h1>
        </div>
    </header>

    <!-- ── Contenido principal ──────────────────────────────────── -->
    <main class="main-content">


        <!-- ══ Panel Notas ══════════════════════════════════════════ -->
        <div class="tab-panel active" id="panelNotas" role="tabpanel">
            <div class="card" style="max-width:520px;margin:0 auto;">
                <div class="card-header">
                    <h2 class="card-title">Subir Notas</h2>
                </div>
                <div class="card-body" style="display:flex;flex-direction:column;gap:16px;">
                    <div class="drop-zone" id="dropZone" role="button" tabindex="0"
                         aria-label="Zona para arrastrar archivo Excel">
                        <div class="drop-zone__icon">
                            <svg width="44" height="44" viewBox="0 0 24 24" fill="none"
                                 stroke="currentColor" stroke-width="1.5"
                                 stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                                <line x1="12" y1="18" x2="12" y2="12"/>
                                <line x1="9" y1="15" x2="12" y2="12"/>
                                <line x1="15" y1="15" x2="12" y2="12"/>
                            </svg>
                        </div>
                        <p class="drop-zone__text">
                            Arrastra tu archivo Excel aquí<br>
                            o haz clic para seleccionar
                        </p>
                        <p class="drop-zone__filename" id="nombreArchivo"></p>
                    </div>
                    <input type="file" id="excelInput" accept=".xlsx,.xls" style="display:none">
                    <button class="btn-primary" id="btnSubirNotas" disabled>
                        Subir Notas
                    </button>
                </div>
            </div>
        </div>

        <!-- ══ Panel Citaciones ═════════════════════════════════════ -->
        <div class="tab-panel" id="panelCitaciones" role="tabpanel">
            <div class="cit-grid">

                <!-- Formulario nueva citación -->
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">Nueva Citación</h2>
                    </div>
                    <div class="card-body">
                        <form id="formCitacion" style="display:flex;flex-direction:column;gap:14px;">

                            <div class="form-group">
                                <label class="form-label" for="citCurso">Curso</label>
                                <select id="citCurso" class="form-input" disabled>
                                    <option value="">— Cargando cursos… —</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="form-label" for="citEstudiante">Estudiante</label>
                                <select id="citEstudiante" class="form-input" disabled>
                                    <option value="">— Selecciona un estudiante —</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="form-label" for="citMotivo">Motivo</label>
                                <select id="citMotivo" class="form-input" required>
                                    <option value="">— Selecciona un motivo —</option>
                                    <option value="FALTAS">Faltas</option>
                                    <option value="DISCIPLINA">Disciplina</option>
                                    <option value="ACADEMICO">Académico</option>
                                    <option value="OTRO">Otro</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="form-label" for="citDescripcion">Descripción</label>
                                <textarea id="citDescripcion" class="form-input form-textarea"
                                          rows="9" placeholder="Describe el motivo de la citación…"
                                          maxlength="500" style="resize:none;"></textarea>
                            </div>

                            <div class="form-group">
                                <label class="form-label" for="citFechaLimite">Fecha límite de asistencia</label>
                                <input id="citFechaLimite" class="form-input" type="date" required>
                            </div>

                            <p id="citError" class="form-error" style="display:none"></p>

                            <button type="submit" class="btn-primary" id="btnEnviarCitacion">
                                Enviar Citación
                            </button>

                        </form>
                    </div>
                </div>

                <!-- Historial -->
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">Historial de Citaciones</h2>
                    </div>
                    <div class="card-body" style="padding:0;">

                        <div class="historial-spinner" id="historialSpinner">
                            <div class="spinner"></div>
                        </div>

                        <p class="historial-vacio" id="historialVacio" style="display:none">
                            Aún no has emitido ninguna citación.
                        </p>

                        <div class="table-wrapper" style="overflow-x:auto;">
                            <table class="data-table" style="min-width:560px;">
                                <thead>
                                    <tr>
                                        <th>Estudiante</th>
                                        <th>Curso</th>
                                        <th>Motivo</th>
                                        <th>Estado</th>
                                        <th>Fecha límite</th>
                                        <th>Enviada</th>
                                    </tr>
                                </thead>
                                <tbody id="tbodyCitaciones"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div><!-- /cit-grid -->
        </div>

    </main>

    <script src="{% static 'js/profesor.js' %}"></script>

</body>
</html>
