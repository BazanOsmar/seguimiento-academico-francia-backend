{% extends 'profesor/_base_profesor.html' %}

{% block title %}Mi Cuenta{% endblock %}

{% block page_css %}
{% load static %}
<link rel="stylesheet" href="{% static 'css/profesor_cuenta.css' %}">
{% endblock %}

{% block main %}
    <div class="page-inner">
        <!-- Hero del perfil -->
        <div class="perfil-hero">
            <div class="perfil-avatar" id="perfilAvatar">?</div>
            <div class="perfil-hero-info">
                <h2 class="perfil-nombre" id="perfilNombre">Cargando…</h2>
                <span class="perfil-username" id="perfilUsername">@—</span>
                <span class="perfil-rol-badge">Docente</span>
                <div class="perfil-actions">
                    <button class="perfil-action-btn" data-cred-mode="password">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        Cambiar contraseña
                    </button>
                    <button class="perfil-action-btn" data-cred-mode="username">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                        </svg>
                        Cambiar usuario
                    </button>
                    <button class="perfil-action-btn" data-cred-mode="both">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                        Cambiar ambos
                    </button>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="perfil-stats">
            <div class="perfil-stat-card">
                <span class="perfil-stat-num" id="statCursos">—</span>
                <span class="perfil-stat-label">Cursos asignados</span>
            </div>
            <div class="perfil-stat-card">
                <span class="perfil-stat-num" id="statCitMes">—</span>
                <span class="perfil-stat-label">Citaciones este mes</span>
            </div>
            <div class="perfil-stat-card">
                <span class="perfil-stat-num" id="statCitTotal">—</span>
                <span class="perfil-stat-label">Citaciones total</span>
            </div>
        </div>

        <!-- Mis cursos -->
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Mis cursos</h3>
            </div>
            <div class="card-body" id="perfilCursosList">
                <div style="display:flex;justify-content:center;padding:20px 0;">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
